<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Leave Portal</title>
<style>
  /* Body styling */
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #ffffcc; /* Updated background color */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 20px;
  }

  /* Logo styling */
.logo {
    max-width: 150px;
    margin-bottom: 20px;
  }

  h1 {
    color: #000000;
    font-size: 2.3rem;
    margin-bottom: 40px;
  }

  /* Button container */
  .button-container {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 100%;
    max-width: 400px;
  }

  /* Buttons styling */
  .button-container a {
    text-decoration: none;
  }

  .btn {
    padding: 18px 0;
    font-size: 1.2rem;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
    width: 100%;
  }

  .btn-sick {
    background: #e53935;
  }

  .btn-sick:hover {
    background: #b71c1c;
  }

  .btn-return {
    background: #43a047;
  }

  .btn-return:hover {
    background: #1b5e20;
  }

  /* Footer note */
  footer {
    margin-top: 50px;
    font-size: 0.9rem;
    color: #555;
  }

  /* Responsive */
  @media (max-width: 500px) {
    h1 {
      font-size: 2rem;
    }
    .btn {
      font-size: 1rem;
      padding: 16px 0;
    }
  }
</style>
</head>
<body>

<!-- Logo -->
<img src="logo" alt="Company Logo" class="logo">

<h1>🏢 Employee Leave Portal</h1>

<div class="button-container">
  <a href="https://forms.office.com/e/CL3uHwEeWv?origin=lprLink" target="_blank">
    <button class="btn btn-sick">🏥 Sick Leave Reporting</button>
  </a>
  <a href="YOUR_RETURN_TO_WORK_FORM_LINK" target="_blank">
    <button class="btn btn-return">💼 Return to Work</button>
  </a>
</div>

<footer>
  © 2026 Employee Portal — All Rights Reserved
</footer>

</body>
</html>
